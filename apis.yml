apis:
- aid: csg:csg-forte-rest-api
  name: CSG Forte REST API
  tags:
  - Payments
  - Billing
  - REST
  - PCI
  - Credit Card
  - ACH
  image: https://raw.githubusercontent.com/api-evangelist/csg/refs/heads/main/image.png
  humanURL: https://developers.forte.net/
  baseURL: https://api.forte.net
  properties:
  - url: https://developers.forte.net/introduction-rest-api/
    type: Documentation
  - url: https://restdocs.forte.net/
    type: Reference
  - url: https://developers.forte.net/getting-started/
    type: GettingStarted
  - url: https://www.forte.net/test-account-setup/
    type: Sandbox
  - url: https://releases.forte.net/
    type: ChangeLog
  - url: https://status.forte.net/
    type: Status
  - url: https://support.forte.net/
    type: Support
  - url: https://training.forte.net/
    type: Training
  description: >-
    CSG Forte provides full-stack REST APIs for payment processing within a PCI-compliant architecture. The API enables merchants and partners to create and update credit card, echeck, and scheduled transactions, securely manage customer and payment data, and query settlement information. Authentication uses standard HTTP credential headers.
- aid: csg:csg-forte-js
  name: CSG Forte.js
  tags:
  - Payments
  - JavaScript
  - SDK
  - Web
  image: https://raw.githubusercontent.com/api-evangelist/csg/refs/heads/main/image.png
  humanURL: https://developers.forte.net/forte-js/
  baseURL: https://api.forte.net
  properties:
  - url: https://developers.forte.net/forte-js/
    type: Documentation
  description: >-
    Forte.js is a JavaScript library for secure browser-based payment tokenization. It enables web applications to collect and tokenize payment card data client-side before submitting to Forte's payment API, reducing PCI scope.
- aid: csg:csg-forte-react-native-sdk
  name: CSG Forte React Native SDK
  tags:
  - Payments
  - Mobile
  - React Native
  - SDK
  image: https://raw.githubusercontent.com/api-evangelist/csg/refs/heads/main/image.png
  humanURL: https://developers.forte.net/forte-react-native/
  baseURL: https://api.forte.net
  properties:
  - url: https://developers.forte.net/forte-react-native/
    type: Documentation
  - url: https://developers.forte.net/forte-react-native/
    type: SDKs
  description: >-
    The Forte React Native SDK enables mobile application developers to integrate payment processing capabilities into iOS and Android apps built with React Native.
- aid: csg:csg-singleview-api
  name: CSG Singleview Billing API
  tags:
  - Telecom
  - Billing
  - BSS
  - Revenue Management
  - SOAP
  image: https://raw.githubusercontent.com/api-evangelist/csg/refs/heads/main/image.png
  humanURL: https://www.csgi.com/
  baseURL: https://api.csgi.com
  properties:
  - url: https://www.csgi.com/
    type: Documentation
  description: >-
    CSG Singleview is a comprehensive, convergent billing and revenue management platform designed for communication service providers. APIs enable subscriber billing, usage rating, invoice generation, and payment processing across converged 5G and IoT services.
